version: '3.9'

services:

  nexus-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://:${REDIS_PASSWORD}@nexus-redis:6379
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - SHEETS_DOCUMENT_ID=${SHEETS_DOCUMENT_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=/secrets/gcp-sa.json
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=900000
      - JWT_REFRESH_EXPIRATION_MS=604800000
      - CORS_ALLOWED_ORIGINS=https://app.shkgroups.com
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=noreply@shkgroups.com
      - MAGIC_LINK_BASE_URL=https://app.shkgroups.com/auth/callback
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - APP_BASE_URL=https://api.shkgroups.com
      - LOG_LEVEL=info
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - nexus-network
    depends_on:
      nexus-redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --notify-keyspace-events KEA
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 300M

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nexus-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - nexus-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

volumes:
  redis-data:
  prometheus-data:

networks:
  nexus-network:
    driver: bridge
