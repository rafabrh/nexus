version: '3.9'

services:

  nexus-api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nexus-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - REDIS_URL=redis://:${REDIS_PASSWORD}@nexus-redis:6379
      - DATABASE_URL=postgres://nexus:${POSTGRES_PASSWORD}@nexus-postgres:5432/nexus
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - SHEETS_DOCUMENT_ID=${SHEETS_DOCUMENT_ID}
      - GOOGLE_SERVICE_ACCOUNT_JSON=/secrets/gcp-sa.json
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_MS=900000
      - JWT_REFRESH_EXPIRATION_MS=604800000
      - CORS_ALLOWED_ORIGINS=https://app.shkgroups.com
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM=noreply@shkgroups.com
      - MAGIC_LINK_BASE_URL=https://app.shkgroups.com/auth/callback
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - APP_BASE_URL=https://api.shkgroups.com
      - LOG_LEVEL=info
    volumes:
      - ./secrets:/secrets:ro
    networks:
      - nexus-network
    depends_on:
      nexus-redis:
        condition: service_healthy
      nexus-postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # Postgres é o sistema de registro do painel (tenants, usuários, reminders,
  # quick replies e a projeção durável de conversas). O Redis segue como
  # barramento do N8N. As migrations são aplicadas no boot do nexus-api.
  nexus-postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=nexus
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --notify-keyspace-events KEA
      --maxmemory 384mb
      --maxmemory-policy volatile-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # Backup off-host: o RDB/AOF no volume redis-data NAO e backup (perda do
  # volume = perda do dado). Este sidecar tira um snapshot RDB a cada 6h para
  # ./backups, retem 7 dias e deve ser sincronizado para object storage
  # (ex.: cron no host com `rclone copy ./backups remote:nexus-redis-backups`).
  nexus-redis-backup:
    image: redis:7-alpine
    container_name: nexus-redis-backup
    restart: unless-stopped
    depends_on:
      nexus-redis:
        condition: service_healthy
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./backups:/backups
    networks:
      - nexus-network
    entrypoint:
      - sh
      - -c
      - |
        while true; do
          redis-cli -h nexus-redis -a "$$REDIS_PASSWORD" --no-auth-warning \
            --rdb /backups/dump-$$(date +%Y%m%d-%H%M).rdb || echo "backup falhou";
          find /backups -name 'dump-*.rdb' -mtime +7 -delete;
          sleep 21600;
        done

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: nexus-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - nexus-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

volumes:
  redis-data:
  postgres-data:
  prometheus-data:

networks:
  nexus-network:
    driver: bridge
